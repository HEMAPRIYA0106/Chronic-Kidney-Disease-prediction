<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NephroAI — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:      #0e1117;
      --ink-soft: #4a5163;
      --paper:    #f8f7f4;
      --white:    #ffffff;
      --teal:     #0d9488;
      --teal-lt:  #ccfbf1;
      --red:      #dc2626;
      --red-lt:   #fee2e2;
      --line:     #e5e3df;
      --shadow:   0 2px 16px rgba(14,17,23,.08);
      --r:        10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      background: var(--white);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      padding: 0 32px;
      height: 60px;
    }
    .nav-brand {
      font-family: 'DM Serif Display', serif;
      font-size: 1.35rem;
      color: var(--teal);
      letter-spacing: -.5px;
    }
    .nav-brand span { color: var(--ink); }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, var(--teal) 0%, #0f766e 100%);
      color: var(--white);
      padding: 44px 32px 36px;
      text-align: center;
    }
    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 400;
      margin-bottom: 8px;
      letter-spacing: -.5px;
    }
    .hero p { font-size: .95rem; opacity: .85; }

    /* ── LOGIN CARD ── */
    .login-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }
    .login-card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 40px 36px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 420px;
    }
    .login-card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .login-card-sub {
      font-size: .85rem;
      color: var(--ink-soft);
      margin-bottom: 28px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    .field label {
      font-size: .78rem;
      font-weight: 600;
      color: var(--ink-soft);
      letter-spacing: .3px;
    }
    .field input {
      height: 44px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: .92rem;
      color: var(--ink);
      background: var(--white);
      transition: border-color .2s, box-shadow .2s;
      width: 100%;
    }
    .field input:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(13,148,136,.12);
    }
    .field.has-error input {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(220,38,38,.10);
    }

    /* password toggle */
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--ink-soft); font-size: 1rem; padding: 4px;
      transition: color .2s;
    }
    .pw-toggle:hover { color: var(--teal); }

    .error-msg {
      display: none;
      background: var(--red-lt);
      border: 1px solid #fca5a5;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: .82rem;
      color: #991b1b;
      margin-bottom: 18px;
      animation: slideUp .3s ease-out;
    }
    .error-msg.show { display: block; }

    .login-btn {
      width: 100%;
      height: 48px;
      background: var(--teal);
      color: var(--white);
      border: none;
      border-radius: var(--r);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: .3px;
      transition: background .2s, transform .1s;
      margin-top: 4px;
    }
    .login-btn:hover   { background: #0f766e; }
    .login-btn:active  { transform: scale(.99); }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: .75rem;
      color: var(--ink-soft);
    }

    /* spinner inside button */
    .btn-inner { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    .login-btn.loading .spinner { display: block; }
    .login-btn.loading .btn-text { opacity: .7; }

    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes slideUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    @media (max-width: 480px) {
      .login-card { padding: 28px 20px; }
      .hero { padding: 32px 16px 28px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-brand">Nephro<span>AI</span></div>
  </nav>

  <div class="hero">
    <h1>Kidney Disease Prediction</h1>
    <p>Sign in to access the clinical prediction system</p>
  </div>

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-card-title">Welcome back</div>
      <div class="login-card-sub">Enter your credentials to continue</div>

      <div class="error-msg" id="errorMsg">Invalid username or password. Please try again.</div>

      <div class="field" id="field-username">
        <label for="username">USERNAME</label>
        <input type="text" id="username" placeholder="Enter username"
               autocomplete="username" oninput="clearError()" />
      </div>

      <div class="field" id="field-password">
        <label for="password">PASSWORD</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Enter password"
                 autocomplete="current-password"
                 oninput="clearError()"
                 onkeydown="if(event.key==='Enter') doLogin()" />
          <button class="pw-toggle" type="button" onclick="togglePw()" title="Show/hide password">👁</button>
        </div>
      </div>

      <button class="login-btn" id="loginBtn" onclick="doLogin()">
        <div class="btn-inner">
          <div class="spinner"></div>
          <span class="btn-text">Sign In</span>
        </div>
      </button>

      <div class="login-footer">NephroAI · Clinical Decision Support</div>
    </div>
  </div>

  <script>
    function clearError() {
      document.getElementById('errorMsg').classList.remove('show');
      document.getElementById('field-username').classList.remove('has-error');
      document.getElementById('field-password').classList.remove('has-error');
    }

    function togglePw() {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username) {
        document.getElementById('field-username').classList.add('has-error');
        document.getElementById('username').focus();
        return;
      }
      if (!password) {
        document.getElementById('field-password').classList.add('has-error');
        document.getElementById('password').focus();
        return;
      }

      const btn = document.getElementById('loginBtn');
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res  = await fetch('/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.success) {
          window.location.href = '/';
        } else {
          document.getElementById('errorMsg').textContent =
            data.error || 'Invalid username or password.';
          document.getElementById('errorMsg').classList.add('show');
          document.getElementById('field-username').classList.add('has-error');
          document.getElementById('field-password').classList.add('has-error');
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch (err) {
        document.getElementById('errorMsg').textContent = 'Connection error. Please try again.';
        document.getElementById('errorMsg').classList.add('show');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
