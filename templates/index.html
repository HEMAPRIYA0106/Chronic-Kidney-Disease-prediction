<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NephroAI — Kidney Disease Prediction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════════════
       TOKENS & RESET
    ═══════════════════════════════════════════════════ */
    :root {
      --ink:      #0e1117;
      --ink-soft: #4a5163;
      --paper:    #f8f7f4;
      --white:    #ffffff;
      --teal:     #0d9488;
      --teal-lt:  #ccfbf1;
      --red:      #dc2626;
      --red-lt:   #fee2e2;
      --gold:     #b45309;
      --line:     #e5e3df;
      --shadow:   0 2px 16px rgba(14,17,23,.08);
      --r:        10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ═══════════════════════════════════════════════════
       VIEWS (pages)
    ═══════════════════════════════════════════════════ */
    .view { display: none; }
    .view.active { display: block; }

    /* ═══════════════════════════════════════════════════
       TOP NAV
    ═══════════════════════════════════════════════════ */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--white);
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 60px;
    }
    .nav-brand {
      font-family: 'DM Serif Display', serif;
      font-size: 1.35rem; color: var(--teal);
      letter-spacing: -.5px;
    }
    .nav-brand span { color: var(--ink); }
    .nav-links { display: flex; gap: 8px; }
    .nav-btn {
      background: none; border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: .85rem; font-weight: 500;
      color: var(--ink-soft); padding: 6px 14px; border-radius: 20px;
      transition: all .2s;
    }
    .nav-btn:hover, .nav-btn.active {
      background: var(--teal-lt); color: var(--teal);
    }

    /* ═══════════════════════════════════════════════════
       HERO STRIP (form page)
    ═══════════════════════════════════════════════════ */
    .hero {
      background: linear-gradient(135deg, var(--teal) 0%, #0f766e 100%);
      color: var(--white); padding: 44px 32px 36px;
      text-align: center;
    }
    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 400;
      margin-bottom: 8px; letter-spacing: -.5px;
    }
    .hero p { font-size: .95rem; opacity: .85; max-width: 480px; margin: 0 auto; }

    /* ═══════════════════════════════════════════════════
       FORM CARD
    ═══════════════════════════════════════════════════ */
    .form-wrap {
      max-width: 860px; margin: 0 auto;
      padding: 36px 24px 60px;
    }
    .section-label {
      font-size: .7rem; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--teal);
      margin-bottom: 14px; padding-left: 2px;
    }
    .card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 18px; }
    .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 18px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: .78rem; font-weight: 600; color: var(--ink-soft);
      letter-spacing: .3px;
    }
    .field .hint { font-size: .7rem; color: #94a3b8; margin-top: -2px; }
    input[type="number"], select {
      height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: .92rem;
      color: var(--ink);
      background: var(--white);
      transition: border-color .2s, box-shadow .2s;
      width: 100%;
    }
    input[type="number"]:focus, select:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(13,148,136,.12);
    }

    .predict-btn {
      width: 100%; height: 52px;
      background: var(--teal); color: var(--white);
      border: none; border-radius: var(--r);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem; font-weight: 600;
      cursor: pointer; letter-spacing: .3px;
      transition: background .2s, transform .1s;
      margin-top: 8px;
    }
    .predict-btn:hover { background: #0f766e; }
    .predict-btn:active { transform: scale(.99); }
    .predict-btn:disabled { opacity: .6; cursor: not-allowed; }

    /* ═══════════════════════════════════════════════════
       RESULT / DASHBOARD VIEW
    ═══════════════════════════════════════════════════ */
    .dashboard-wrap { max-width: 860px; margin: 0 auto; padding: 36px 24px 60px; }

    .result-banner {
      border-radius: var(--r); padding: 32px 28px;
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 28px;
      animation: slideUp .4s ease-out;
    }
    .result-banner.ckd   { background: var(--red-lt); border: 1px solid #fca5a5; }
    .result-banner.notkd { background: var(--teal-lt); border: 1px solid #5eead4; }

    .result-icon { font-size: 3rem; flex-shrink: 0; }
    .result-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem; margin-bottom: 4px;
    }
    .result-banner.ckd   .result-title { color: var(--red); }
    .result-banner.notkd .result-title { color: var(--teal); }
    .result-sub { font-size: .9rem; color: var(--ink-soft); }

    /* Stats row */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--white); border: 1px solid var(--line);
      border-radius: var(--r); padding: 20px; text-align: center;
      box-shadow: var(--shadow);
    }
    .stat-num { font-family: 'DM Serif Display', serif; font-size: 2rem; }
    .stat-num.total { color: var(--gold); }
    .stat-num.ckd   { color: var(--red); }
    .stat-num.safe  { color: var(--teal); }
    .stat-lbl { font-size: .75rem; color: var(--ink-soft); margin-top: 4px; letter-spacing: .5px; text-transform: uppercase; }

    /* Summary table in result */
    .input-summary { overflow-x: auto; }
    .summary-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    .summary-table th {
      text-align: left; padding: 8px 12px;
      background: #f1faf9; color: var(--teal);
      font-size: .72rem; letter-spacing: 1px; text-transform: uppercase;
      border-bottom: 2px solid var(--line);
    }
    .summary-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--ink);
    }
    .summary-table tr:last-child td { border-bottom: none; }
    .summary-table tr:hover td { background: #fafaf9; }

    /* Action buttons */
    .action-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
    .btn-outline {
      flex: 1; min-width: 140px; height: 44px;
      border: 1.5px solid var(--teal); color: var(--teal);
      background: none; border-radius: var(--r);
      font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 600;
      cursor: pointer; transition: all .2s;
    }
    .btn-outline:hover { background: var(--teal-lt); }
    .btn-solid {
      flex: 1; min-width: 140px; height: 44px;
      background: var(--teal); color: var(--white);
      border: none; border-radius: var(--r);
      font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    .btn-solid:hover { background: #0f766e; }

    /* ═══════════════════════════════════════════════════
       HISTORY VIEW
    ═══════════════════════════════════════════════════ */
    .history-wrap { max-width: 960px; margin: 0 auto; padding: 36px 24px 60px; }
    .history-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
    }
    .history-title {
      font-family: 'DM Serif Display', serif; font-size: 1.6rem;
    }
    .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-tab {
      padding: 6px 16px; border-radius: 20px; font-size: .82rem; font-weight: 500;
      border: 1.5px solid var(--line); background: var(--white);
      cursor: pointer; transition: all .2s; color: var(--ink-soft);
    }
    .filter-tab.active { background: var(--teal); color: var(--white); border-color: var(--teal); }

    .history-grid { display: grid; gap: 14px; }
    .history-card {
      background: var(--white); border: 1px solid var(--line);
      border-radius: var(--r); padding: 18px 20px;
      display: flex; align-items: center; gap: 16px;
      box-shadow: var(--shadow);
      animation: slideUp .3s ease-out;
      transition: box-shadow .2s;
    }
    .history-card:hover { box-shadow: 0 4px 24px rgba(14,17,23,.12); }
    .h-badge {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
    }
    .h-badge.ckd   { background: var(--red-lt); }
    .h-badge.notkd { background: var(--teal-lt); }
    .h-info { flex: 1; }
    .h-result { font-weight: 600; font-size: .95rem; margin-bottom: 2px; }
    .h-result.ckd   { color: var(--red); }
    .h-result.notkd { color: var(--teal); }
    .h-meta { font-size: .78rem; color: var(--ink-soft); }
    .h-detail {
      display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
    }
    .h-chips { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .chip {
      font-size: .7rem; padding: 3px 9px; border-radius: 12px;
      background: #f1f5f9; color: var(--ink-soft); white-space: nowrap;
    }
    .delete-btn {
      background: none; border: none; cursor: pointer;
      color: #cbd5e1; font-size: 1.1rem; padding: 4px;
      border-radius: 4px; transition: color .2s;
    }
    .delete-btn:hover { color: var(--red); }

    .empty-state {
      text-align: center; padding: 64px 24px; color: var(--ink-soft);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: .95rem; }

    /* ═══════════════════════════════════════════════════
       LOADER
    ═══════════════════════════════════════════════════ */
    .loader-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(248,247,244,.75); backdrop-filter: blur(4px);
      z-index: 200; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
    }
    .loader-overlay.show { display: flex; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid var(--teal-lt);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    .loader-text { font-size: .9rem; color: var(--teal); font-weight: 600; }

    /* ═══════════════════════════════════════════════════
       ANIMATIONS
    ═══════════════════════════════════════════════════ */
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    /* ═══════════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════════ */
    @media (max-width: 540px) {
      nav { padding: 0 16px; }
      .form-wrap, .dashboard-wrap, .history-wrap { padding: 24px 16px 48px; }
      .stats-row { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .stat-card { padding: 14px 8px; }
      .stat-num { font-size: 1.5rem; }
      .h-chips { display: none; }
    }
  </style>
</head>
<body>

<!-- ── LOADER ──────────────────────────────────────────────────────── -->
<div class="loader-overlay" id="loader">
  <div class="spinner"></div>
  <div class="loader-text">Analysing…</div>
</div>

<!-- ── NAV ──────────────────────────────────────────────────────────── -->
<nav>
  <div class="nav-brand">Nephro<span>AI</span></div>
  <div class="nav-links">
    <button class="nav-btn active" id="navForm"    onclick="goTo('form')">Predict</button>
    <button class="nav-btn"        id="navHistory" onclick="goTo('history'); loadHistory();">History</button>
  </div>
</nav>

<!-- ══════════════════════════════════════════════════════════════════
     VIEW 1 — PREDICTION FORM
════════════════════════════════════════════════════════════════════ -->
<div class="view active" id="viewForm">
  <div class="hero">
    <h1>Kidney Disease Prediction</h1>
    <p>Enter patient lab values below and receive an instant CKD risk assessment.</p>
  </div>

  <div class="form-wrap">
    <!-- Numerical inputs -->
    <p class="section-label">Lab & Vitals</p>
    <div class="card">
      <div class="grid-3">
        <div class="field">
          <label>Age <span class="hint">(years)</span></label>
          <input type="number" step="any" name="age" />
        </div>
        <div class="field">
          <label>Blood Pressure <span class="hint">(mm/Hg)</span></label>
          <input type="number" step="any" name="bp" />
        </div>
        <div class="field">
          <label>Specific Gravity <span class="hint">(SG)</span></label>
          <input type="number" step="any" name="sg" />
        </div>
        <div class="field">
          <label>Albumin <span class="hint">(AL)</span></label>
          <input type="number" step="any" name="al" />
        </div>
        <div class="field">
          <label>Sugar <span class="hint">(SU)</span></label>
          <input type="number" step="any" name="su" />
        </div>
        <div class="field">
          <label>Blood Glucose <span class="hint">(BGR mg/dl)</span></label>
          <input type="number" step="any" name="bgr" />
        </div>
        <div class="field">
          <label>Blood Urea <span class="hint">(BU mg/dl)</span></label>
          <input type="number" step="any" name="bu" />
        </div>
        <div class="field">
          <label>Serum Creatinine <span class="hint">(SC mgs/dl)</span></label>
          <input type="number" step="any" name="sc" />
        </div>
        <div class="field">
          <label>Sodium <span class="hint">(SOD mEq/L)</span></label>
          <input type="number" step="any" name="sod" />
        </div>
        <div class="field">
          <label>Potassium <span class="hint">(POT mEq/L)</span></label>
          <input type="number" step="any" name="pot" />
        </div>
        <div class="field">
          <label>Haemoglobin <span class="hint">(HEMO g)</span></label>
          <input type="number" step="any" name="hemo" />
        </div>
        <div class="field">
          <label>Packed Cell Vol. <span class="hint">(PCV)</span></label>
          <input type="number" step="any" name="pcv" />
        </div>
        <div class="field">
          <label>Red Cell Count <span class="hint">(RC millions)</span></label>
          <input type="number" step="any" name="rc" />
        </div>
      </div>
    </div>

    <!-- Categorical inputs -->
    <p class="section-label">Clinical Indicators</p>
    <div class="card">
      <div class="grid-2">
        <div class="field">
          <label>Hypertension (HTN)</label>
          <select name="htn">
            <option value="1">Yes</option>
            <option value="0">No</option>
          </select>
        </div>
        <div class="field">
          <label>Diabetes Mellitus (DM)</label>
          <select name="dm">
            <option value="1">Yes</option>
            <option value="0">No</option>
          </select>
        </div>
        <div class="field">
          <label>Appetite</label>
          <select name="appet">
            <option value="1">Good</option>
            <option value="0">Poor</option>
          </select>
        </div>
        <div class="field">
          <label>Pedal Oedema (PE)</label>
          <select name="pe">
            <option value="1">Yes</option>
            <option value="0">No</option>
          </select>
        </div>
        <div class="field">
          <label>Anaemia (ANE)</label>
          <select name="ane">
            <option value="1">Yes</option>
            <option value="0">No</option>
          </select>
        </div>
      </div>
    </div>

    <button class="predict-btn" id="predictBtn" onclick="predict()">
      Run Prediction
    </button>
  </div>
</div><!-- /viewForm -->


<!-- ══════════════════════════════════════════════════════════════════
     VIEW 2 — RESULT DASHBOARD
════════════════════════════════════════════════════════════════════ -->
<div class="view" id="viewDashboard">
  <div class="dashboard-wrap">

    <!-- Result banner -->
    <div class="result-banner" id="resultBanner">
      <div class="result-icon" id="resultIcon"></div>
      <div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-sub"  id="resultSub"></div>
      </div>
    </div>

    <!-- Stats -->
    <p class="section-label">Session Statistics</p>
    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-num total" id="statTotal">0</div>
        <div class="stat-lbl">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-num ckd" id="statCKD">0</div>
        <div class="stat-lbl">CKD Detected</div>
      </div>
      <div class="stat-card">
        <div class="stat-num safe" id="statSafe">0</div>
        <div class="stat-lbl">No CKD</div>
      </div>
    </div>

    <!-- Input summary -->
    <p class="section-label">Patient Input Summary</p>
    <div class="card input-summary">
      <table class="summary-table" id="summaryTable"></table>
    </div>

    <!-- Actions -->
    <div class="action-row">
      <button class="btn-outline" onclick="goTo('form')">← New Prediction</button>
      <button class="btn-solid"   onclick="goTo('history'); loadHistory();">View History</button>
    </div>

  </div>
</div><!-- /viewDashboard -->


<!-- ══════════════════════════════════════════════════════════════════
     VIEW 3 — HISTORY
════════════════════════════════════════════════════════════════════ -->
<div class="view" id="viewHistory">
  <div class="history-wrap">
    <div class="history-header">
      <div class="history-title">Prediction History</div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterHistory('all', this)">All</button>
        <button class="filter-tab"        onclick="filterHistory('ckd', this)">CKD Only</button>
        <button class="filter-tab"        onclick="filterHistory('safe', this)">No CKD</button>
      </div>
    </div>
    <div class="history-grid" id="historyGrid"></div>
  </div>
</div><!-- /viewHistory -->


<script>
  /* ── State ────────────────────────────────────────────────────────── */
  let allHistory = [];
  let lastInputData = {};

  const LABELS = {
    age:"Age", bp:"BP", sg:"SG", al:"Albumin", su:"Sugar",
    bgr:"Blood Glucose", bu:"Blood Urea", sc:"Serum Creat.",
    sod:"Sodium", pot:"Potassium", hemo:"Haemoglobin",
    pcv:"PCV", rc:"Red Cell Count",
    htn:"Hypertension", dm:"Diabetes", appet:"Appetite",
    pe:"Pedal Oedema", ane:"Anaemia"
  };
  const CAT_LABELS = {
    htn:{1:"Yes",0:"No"}, dm:{1:"Yes",0:"No"}, appet:{1:"Good",0:"Poor"},
    pe:{1:"Yes",0:"No"}, ane:{1:"Yes",0:"No"}
  };

  /* ── Navigation ───────────────────────────────────────────────────── */
  function goTo(view) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('view' + view.charAt(0).toUpperCase() + view.slice(1))
            .classList.add('active');
    if (view === 'form') {
      document.getElementById('navForm').classList.add('active');
      // Clear all number inputs
      document.querySelectorAll('input[type="number"]').forEach(i => i.value = '');
      // Reset all dropdowns to first option
      document.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
    }
    if (view === 'history') document.getElementById('navHistory').classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /* ── Predict ──────────────────────────────────────────────────────── */
  async function predict() {
    const names = ["age","bp","sg","al","su","bgr","bu","sc","sod","pot",
                   "hemo","pcv","rc","htn","dm","appet","pe","ane"];
    const values = [];
    lastInputData = {};

    for (const name of names) {
      const el = document.querySelector(`[name="${name}"]`);
      const v  = parseFloat(el.value);
      values.push(isNaN(v) ? 0 : v);
      lastInputData[name] = isNaN(v) ? '' : v;
    }

    document.getElementById('loader').classList.add('show');
    document.getElementById('predictBtn').disabled = true;

    try {
      const res  = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ features: values })
      });
      const data = await res.json();

      if (data.error) { alert('Error: ' + data.error); return; }

      // Populate dashboard
      showDashboard(data.prediction);
      await refreshStats();
      goTo('dashboard');

    } catch (err) {
      alert('Network error – is the Flask server running?');
    } finally {
      document.getElementById('loader').classList.remove('show');
      document.getElementById('predictBtn').disabled = false;
    }
  }

  /* ── Build dashboard ──────────────────────────────────────────────── */
  function showDashboard(prediction) {
    const banner = document.getElementById('resultBanner');
    const icon   = document.getElementById('resultIcon');
    const title  = document.getElementById('resultTitle');
    const sub    = document.getElementById('resultSub');

    banner.className = 'result-banner ' + (prediction === 1 ? 'ckd' : 'notkd');
    icon.textContent = prediction === 1 ? '⚠️' : '✅';
    title.textContent = prediction === 1 ? 'Chronic Kidney Disease Detected' : 'No Chronic Kidney Disease';
    sub.textContent   = prediction === 1
      ? 'The model indicates a high risk of CKD. Please consult a nephrologist.'
      : 'The model found no indicators of CKD based on the provided values.';

    // Build summary table
    const names = ["age","bp","sg","al","su","bgr","bu","sc","sod","pot",
                   "hemo","pcv","rc","htn","dm","appet","pe","ane"];
    const catKeys = new Set(["htn","dm","appet","pe","ane"]);
    let rows = '<tr><th>Parameter</th><th>Value</th><th>Parameter</th><th>Value</th></tr>';
    for (let i = 0; i < names.length; i += 2) {
      const k1 = names[i], k2 = names[i+1];
      const v1 = catKeys.has(k1) ? CAT_LABELS[k1][lastInputData[k1]] : (lastInputData[k1] || '—');
      const v2 = k2 ? (catKeys.has(k2) ? CAT_LABELS[k2][lastInputData[k2]] : (lastInputData[k2] || '—')) : '';
      rows += `<tr>
        <td><strong>${LABELS[k1]}</strong></td><td>${v1}</td>
        <td><strong>${k2 ? LABELS[k2] : ''}</strong></td><td>${v2}</td>
      </tr>`;
    }
    document.getElementById('summaryTable').innerHTML = rows;
  }

  /* ── Stats ────────────────────────────────────────────────────────── */
  async function refreshStats() {
    try {
      const res  = await fetch('/history/stats');
      const data = await res.json();
      document.getElementById('statTotal').textContent = data.total;
      document.getElementById('statCKD').textContent   = data.ckd;
      document.getElementById('statSafe').textContent  = data.non_ckd;
    } catch (_) {}
  }

  /* ── History ──────────────────────────────────────────────────────── */
  async function loadHistory() {
    try {
      const res  = await fetch('/history');
      allHistory = await res.json();
      renderHistory(allHistory);
    } catch (_) {
      document.getElementById('historyGrid').innerHTML =
        '<div class="empty-state"><div class="empty-icon">⚠️</div><p>Could not load history.</p></div>';
    }
  }

  function filterHistory(type, btn) {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (type === 'all')  renderHistory(allHistory);
    if (type === 'ckd')  renderHistory(allHistory.filter(r => r.prediction === 1));
    if (type === 'safe') renderHistory(allHistory.filter(r => r.prediction === 0));
  }

  function renderHistory(records) {
    const grid = document.getElementById('historyGrid');
    if (!records.length) {
      grid.innerHTML = `<div class="empty-state">
        <div class="empty-icon">📋</div>
        <p>No predictions yet. Run a prediction to see results here.</p>
      </div>`;
      return;
    }
    grid.innerHTML = records.map(r => {
      const isCKD = r.prediction === 1;
      return `
      <div class="history-card" id="hcard-${r.id}">
        <div class="h-badge ${isCKD ? 'ckd' : 'notkd'}">${isCKD ? '⚠️' : '✅'}</div>
        <div class="h-info">
          <div class="h-result ${isCKD ? 'ckd' : 'notkd'}">${r.result}</div>
          <div class="h-meta">#${r.id} &nbsp;·&nbsp; ${r.timestamp}</div>
        </div>
        <div class="h-detail">
          <div class="h-chips">
            <span class="chip">Age ${r.age}</span>
            <span class="chip">BP ${r.bp}</span>
            <span class="chip">SG ${r.sg}</span>
            <span class="chip">Hemo ${r.hemo}</span>
          </div>
          <button class="delete-btn" title="Delete" onclick="deleteRecord(${r.id})">🗑</button>
        </div>
      </div>`;
    }).join('');
  }

  async function deleteRecord(id) {
    if (!confirm('Remove this record from history?')) return;
    await fetch(`/history/${id}`, { method: 'DELETE' });
    allHistory = allHistory.filter(r => r.id !== id);
    renderHistory(allHistory);
  }
</script>
</body>
</html>
